<!DOCTYPE html>
<html>
<head>
<title>AI GOLD PRO</title>
<link rel="manifest" href="/manifest.json">
<script src="https://s3.tradingview.com/tv.js"></script>
</head>

<body style="background:black;color:white">

<h1>🔥 AI GOLD PRO</h1>

<div id="chart" style="height:400px;"></div>

<input id="key" placeholder="VIP KEY">
<button onclick="login()">Login</button>

<h2 id="signal"></h2>

<button onclick="pay()">💳 สมัคร VIP</button>
<img id="qr" width="200">

<script>
let vip = false

async function login(){
  let key = document.getElementById("key").value
  let r = await fetch(`/api/auth?key=${key}`)
  let d = await r.json()
  vip = d.vip
}

async function load(){
  let r = await fetch('/api/signal')
  let d = await r.json()

  if(vip){
    signal.innerText = JSON.stringify(d,null,2)
  }else{
    signal.innerText = "Signal: " + d.signal
  }
}

setInterval(load,60000)
</script>

</body>
</html>
setInterval(async ()=>{
  let r = await fetch('/api/signal')
  let d = await r.json()

  document.getElementById("signal").innerText =
  `${d.signal} | TP: ${d.tp} | SL: ${d.sl}`

}, 300000)
<input id="key" placeholder="ใส่ KEY VIP">
<button onclick="checkVIP()">Login</button>

<h2 id="signal">รอสัญญาณ...</h2>
<h3>💳 อัปโหลดสลิป</h3>

<input type="file" id="slip">
<button onclick="uploadSlip()">ส่งสลิป</button>

<p id="status"></p>

<script>
async function uploadSlip(){

  const file = document.getElementById("slip").files[0]

  const reader = new FileReader()

  reader.onload = async function(){

    const base64 = reader.result

    let r = await fetch('/api/verifySlip',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        slip_image: base64,
        user_id: "demo_user"
      })
    })

    let d = await r.json()

    if(d.success){
      document.getElementById("status").innerText =
      "✅ ได้ KEY: " + d.key
    }else{
      document.getElementById("status").innerText =
      "❌ สลิปไม่ถูกต้อง"
    }

  }

  reader.readAsDataURL(file)
}
</script>
